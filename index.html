            if (isUserClickedLock || forceLoadingState) return;
            let loader = document.getElementById('loaderOverlay'); loader.style.display = 'flex';
            speakLoud("डाटा हैक किया जा रहा है।");

            setTimeout(() => {
                processAdvancedVipEngine();
                loader.style.display = 'none'; isUserClickedLock = true;
                let btn = document.getElementById('execBtn'); btn.disabled = true; btn.innerText = "LOCKED";
            }, 2500);
        }

        /* 🧠 ऑटो-एआई प्रेडिक्शन इंजन (खुद दिमाग लगाकर रिजल्ट निकालने वाला लॉजिक) */
        function processAdvancedVipEngine() {
            let historyArr = serverHistory.length > 0 ? [...serverHistory] : [1, 3, 0, 2, 8, 4, 7, 5, 9, 6];
            let patternBinary = historyArr.map(num => num >= 5 ? 1 : 0);
            let lastFour = patternBinary.slice(-4); let bigCount = lastFour.filter(x => x === 1).length;

            let predResult = "BIG";
            if (lastResultStatus === "LOSS" && currentBetLevel === 2) {
                predResult = (bigCount >= 2) ? "BIG" : "SMALL";
            } else {
                predResult = (bigCount >= 2) ? "SMALL" : "BIG";
            }

            // [बदलाव] यहाँ आपकी शर्त के मुताबिक परिणाम को पूरी तरह उल्टा (Reverse) किया गया है।
            if (predResult === "BIG") {
                predResult = "SMALL";
            } else {
                predResult = "BIG";
            }

            let numCounts = {}; for(let i=0; i<=9; i++) numCounts[i] = 0;
            historyArr.forEach(n => numCounts[n]++);

            let bestTargetNum = 0; let targetGroup = (predResult === "BIG") ? [5,6,7,8,9] : [0,1,2,3,4];
            let minCount = 999;
            targetGroup.forEach(num => {
                if(numCounts[num] < minCount) { minCount = numCounts[num]; bestTargetNum = num; }
            });

            let finalConfidence = (currentBetLevel === 2) ? 99 : (96 + Math.floor(Math.random() * 3)); 
            let txtEl = document.getElementById('textOutput');
            txtEl.innerText = predResult;
            txtEl.className = (predResult === "BIG") ? "huge-pred-text big" : "huge-pred-text small";
            
            lastPredictedText = predResult;

            let ball1 = bestTargetNum; let ball2 = targetGroup.filter(x => x !== bestTargetNum)[Math.floor(Math.random() * 4)];
            function getBallColorClass(n) { return [1,3,7,9].includes(n) ? 'ball-g' : 'ball-r'; }

            document.getElementById('ballsOutput').innerHTML = `
                <div><div class="luxury-ball ${getBallColorClass(ball1)}">${ball1}</div></div>
                <div><div class="luxury-ball ${getBallColorClass(ball2)}">${ball2}</div></div>
            `;
            
            document.getElementById('confTxt').innerText = finalConfidence + "%";
            drawConfidenceDots(finalConfidence);

            let resultHindi = predResult === 'BIG' ? 'बिग' : 'स्मॉल';
            speakLoud(`अगला परिणाम ${resultHindi} है और संभावित नंबर ${ball1} है।`);
        }

        function drawConfidenceDots(percentage) {
            let container = document.getElementById('dotGridChunk'); container.innerHTML = '';
            let totalChunks = 24; let fillCount = Math.round((percentage / 100) * totalChunks);
            for(let i=0; i<totalChunks; i++) { container.innerHTML += `<div class="dot-pulse-chunk ${(i < fillCount) ? "fill" : ""}"></div>`; }
        }

        function clearDisplayFields() {
            document.getElementById('textOutput').innerText = "READY";
            document.getElementById('textOutput').className = "huge-pred-text ready";
            document.getElementById('ballsOutput').innerHTML = '';
            document.getElementById('emojiBadge').style.display = "none";
            document.getElementById('confTxt').innerText = "0%"; drawConfidenceDots(0);
        }

        function changeEngineMode(e, mode) {
            if(e) { e.preventDefault(); e.stopPropagation(); }
            if (engineMode === mode) return;
            engineMode = mode; currentAPI = (mode === '30s') ? url30s : url1m;
            document.getElementById('t30').classList.toggle('active', mode === '30s');
            document.getElementById('t60').classList.toggle('active', mode === '1m');
            isUserClickedLock = false; currentBetLevel = 1; lastResultStatus = "WIN"; lastPredictedText = "";
            clearDisplayFields(); fetchLivePeriod();
            speakLoud(`${mode === '30s' ? 'तीस सेकंड' : 'एक मिनट'} मोड एक्टिवेटेड।`);
        }

        function toggleInterface() {
            let p = document.getElementById('panelWrapper'); p.style.display = (p.style.display === 'none') ? 'block' : 'none';
        }

        function setupDragSystem() {
            const panel = document.getElementById("panelWrapper"); const dragZone = document.getElementById("dragZone"); const floatIcon = document.getElementById("floatIcon");
            let pActive = false, pX = 0, pY = 0;
            dragZone.addEventListener("touchstart", (e) => { pActive = true; pX = e.touches[0].clientX - panel.getBoundingClientRect().left; pY = e.touches[0].clientY - panel.getBoundingClientRect().top; }, {passive: true});
            document.addEventListener("touchmove", (e) => { if (!pActive) return; let left = e.touches[0].clientX - pX; let top = e.touches[0].clientY - pY; left = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, left)); top = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, top)); panel.style.left = left + "px"; panel.style.top = top + "px"; }, {passive: true});
            document.addEventListener("touchend", () => { pActive = false; });

            let iActive = false, iX = 0, iY = 0, moved = false;
            floatIcon.addEventListener("touchstart", (e) => { iActive = true; moved = false; iX = e.touches[0].clientX - floatIcon.getBoundingClientRect().left; iY = e.touches[0].clientY - floatIcon.getBoundingClientRect().top; e.stopPropagation(); }, {passive: true});
            document.addEventListener("touchmove", (e) => { if (!iActive) return; moved = true; let left = e.touches[0].clientX - iX; let top = e.touches[0].clientY - iY; left = Math.max(0, Math.min(window.innerWidth - floatIcon.offsetWidth, left)); top = Math.max(0, Math.min(window.innerHeight - floatIcon.offsetHeight, top)); floatIcon.style.bottom = "auto"; floatIcon.style.right = "auto"; floatIcon.style.left = left + "px"; floatIcon.style.top = top + "px"; }, {passive: true});
            floatIcon.addEventListener("touchend", (e) => { iActive = false; e.stopPropagation(); if (!moved) toggleInterface(); });
        }

        if ('speechSynthesis' in window) { window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); }; }
    </script>
</body>
</html>
