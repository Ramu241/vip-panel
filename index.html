<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX TEAM CYBER 3D PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=500;900&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #game-frame { width: 100%; height: 100vh; border: none; z-index: 1; }
        
        /* 3D Glassmorphic Panel with Blinking Neon Borders */
        #hack-box {
            position: absolute; top: 15%; left: 50%; transform: translate(-50%, 0);
            width: 260px; background: rgba(6, 15, 6, 0.93); 
            border: 3px solid #00ff41; border-radius: 18px; 
            z-index: 9999; backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(0, 255, 65, 0.3), inset 0 4px 10px rgba(255,255,255,0.1);
            display: none; /* शुरुआत में छुपा रहेगा */
            animation: blinkBorder 3s infinite alternate;
        }
        
        /* Round Floating Robot Button with RGB Light Border */
        #show-panel-btn {
            position: absolute; top: 20%; right: 20px;
            width: 60px; height: 60px; 
            background: #050f05;
            border: 3px solid #00ff41; border-radius: 50%;
            font-size: 28px; display: flex; justify-content: center;
            align-items: center; 
            cursor: move; z-index: 9998; display: flex; /* गेम शुरू होते ही सिर्फ यह दिखेगा */
            touch-action: none; user-select: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: blinkBorder 3s infinite alternate;
        }

        /* Beautiful Dynamic Cyberpunk Login UI Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            z-index: 10005; display: none; justify-content: center; align-items: center;
        }
        .login-card {
            background: #060d06; border: 2px solid #00ffcc; border-radius: 16px;
            padding: 30px 20px; width: 260px; text-align: center;
            box-shadow: 0 15px 40px rgba(0, 255, 204, 0.3), inset 0 0 15px rgba(0,255,204,0.1);
            animation: cardAppear 0.3s ease-out;
        }
        @keyframes cardAppear { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .login-card h3 { color: #00ffcc; margin-top: 0; font-size: 14px; letter-spacing: 2px; text-shadow: 0 0 8px #00ffcc; }
        .login-card input {
            width: 85%; padding: 12px; background: #000; border: 1px solid #00ff41;
            color: #00ff41; font-family: 'Orbitron', sans-serif; font-size: 16px;
            text-align: center; border-radius: 8px; font-weight: 900; outline: none;
            box-shadow: inset 0 0 5px rgba(0,255,65,0.2); margin-bottom: 20px;
        }
        .login-card button {
            width: 95%; padding: 12px; background: linear-gradient(90deg, #00ff41, #00ffcc);
            border: none; border-radius: 8px; color: #000; font-weight: 900;
            font-family: 'Orbitron', sans-serif; font-size: 12px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,255,65,0.4); text-transform: uppercase;
        }

        /* RGB Neon Blinking Core Effect */
        @keyframes blinkBorder {
            0% { border-color: #00ff41; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 15px #00ff41; }
            33% { border-color: #00ffcc; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 25px #00ffcc; }
            66% { border-color: #ff00ff; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 20px #ff00ff; }
            100% { border-color: #ffff00; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 15px #ffff00; }
        }
        
        .header { 
            background: linear-gradient(90deg, #00ff41, #00aacc); 
            padding: 10px; border-radius: 15px 15px 0 0; 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: move; touch-action: none; 
        }
        .header span { color: #000; font-size: 11px; font-weight: 900; }
        .content { padding: 15px; text-align: center; }
        
        .period-info { font-size: 12px; color: #fff; margin-bottom: 8px; font-weight: bold; }
        .period-info span { color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }
        
        .prediction-box { font-size: 40px; font-weight: 900; margin: 5px 0; color: #fff; text-shadow: 0 0 20px #00ff41; }
        .numbers-info { font-size: 16px; color: #fff; margin-bottom: 10px; font-weight: bold;}
        .timer-info { font-size: 15px; color: #ffcc00; margin-bottom: 5px; font-weight: bold; }
        
        #progress-bar { height: 6px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; margin-bottom: 15px; }
        #fill { height: 100%; background: #00ff41; width: 100%; transition: width 0.3s linear; }
        
        .tg-btn {
            display: inline-block; width: 90%; padding: 9px 0; margin: 5px 0;
            background: linear-gradient(45deg, #0088cc, #005588);
            color: #fff; text-decoration: none; font-size: 12px; font-weight: 900;
            border-radius: 25px; border: 1px solid #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        /* Growing History Box */
        #history-box {
            position: absolute; top: 22%; left: 50%; transform: translate(-50%, 0);
            width: 280px; height: 320px; background: rgba(5, 5, 5, 0.98);
            border: 2px solid #ffcc00; border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 20px rgba(255, 204, 0, 0.4);
            z-index: 10002; display: none; padding: 12px;
            color: #fff; overflow-y: scroll; font-size: 11px;
        }
        #history-box::-webkit-scrollbar { width: 5px; }
        #history-box::-webkit-scrollbar-thumb { background: #ffcc00; border-radius: 10px; }
        
        .history-item { display: flex; justify-content: space-between; padding: 7px 4px; border-bottom: 1px solid #222; font-weight: bold; }
        .win-tag { color: #00ff41; text-shadow: 0 0 5px #00ff41; }
        .loss-tag { color: #ff3333; text-shadow: 0 0 5px #ff3333; }
        .jackpot-tag { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h3>ENTER SECURITY CODE</h3>
            <input type="password" id="passInput" placeholder="******" maxlength="6">
            <button onclick="verifySecretCode()">VERIFY KEY</button>
        </div>
    </div>

    <div id="show-panel-btn" onclick="handleRobotClick()">🤖</div>

    <div id="history-box">
        <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; padding-bottom: 6px; margin-bottom: 8px;">
            <span style="color:#ffcc00; font-weight: 900;">📜 UNLIMITED LIVE LOGS</span>
            <button onclick="document.getElementById('history-box').style.display='none'" style="background:none; border:none; color:#ff3333; font-size:14px; font-weight:900; cursor:pointer;">[X]</button>
        </div>
        <div id="history-content">Waiting for rounds... Logs will grow continuously.</div>
    </div>

    <div id="hack-box">
        <div class="header" id="handle">
            <span>RX CYBER HACK</span>
            <div>
                <button onclick="showHistory()" style="background:#ffcc00; color:#000; border:none; border-radius:4px; font-size:10px; font-weight:900; cursor:pointer; margin-right:5px; padding: 3px 6px;">HISTORY 📜</button>
                <button onclick="togglePanel(false)" style="background:#000; color:#00ff41; border:1px solid #00ff41; border-radius:4px; font-size:10px; font-weight:900; cursor:pointer; padding: 3px 6px;">HIDE</button>
            </div>
        </div>
        <div class="content">
            <div class="period-info">NEXT PERIOD: <span id="period">CONNECTING...</span></div>
            <div id="signal" class="prediction-box">WAIT</div>
            
            <div class="numbers-info">NUMBERS: <span id="nums" style="color:#fbff00;">? , ?</span></div>
            
            <div class="timer-info">AUTO SYNC IN: <span id="sec">--</span>s</div>
            <div id="progress-bar"><div id="fill"></div></div>
            
            <a href="https://t.me/+h5jDuTLxOEQ4NmVl" target="_blank" class="tg-btn">JOIN TELEGRAM 🚀</a>
            
            <p style="font-size: 10px; color: #00ff41; margin-top: 10px; margin-bottom: 0; font-weight:900; opacity:0.8;">DEVELOPED BY TAMIM</p>
        </div>
    </div>

    <iframe id="game-frame" src="https://bdgwinmy.cc/#/saasLottery/WinGo?gameCode=WinGo_30S&lottery=WinGo"></iframe>

    <script>
        const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
        const tickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        const REQUIRED_PASS = "704215";
        
        let isVerifiedInSession = false; // गेम सेशन वेरिफिकेशन ट्रैकर

        class UltimateEngine {
            constructor() {
                this.history = []; 
                this.last_pred = null;
                this.predicted_number = null; 
                this.log = []; 
            }

            update(num) {
                this.history.unshift(num);
                if (this.history.length > 50) this.history.pop();
            }

            predict() {
                let sum = this.history.slice(0, 5).reduce((a,b)=>a+b, 0);
                let pred = (sum % 2 === 0) ? "BIG" : "SMALL";
                let exactNum = (pred === "BIG") ? [6, 8, 7, 9][sum % 4] : [1, 3, 0, 2][sum % 4];
                
                this.last_pred = pred;
                this.predicted_number = exactNum;
                return { pred: pred, exactNum: exactNum };
            }

            checkOutcome(displayed_issue, actualNum) {
                if (!this.last_pred) return;
                let actualSize = actualNum >= 5 ? "BIG" : "SMALL";
                let status = "❌ LOSS";

                if (actualNum === this.predicted_number) {
                    status = "✨ JACKPOT";
                } else if (actualSize === this.last_pred) {
                    status = "✅ WIN";
                }

                this.log.unshift({
                    issue: displayed_issue.slice(-4),
                    pred: this.last_pred,
                    actual: actualNum + " (" + actualSize + ")",
                    status: status
                });
                this.renderHistoryUI();
            }

            renderHistoryUI() {
                const container = document.getElementById('history-content');
                let html = "";
                this.log.forEach(item => {
                    let styleClass = "loss-tag";
                    if (item.status === "✅ WIN") styleClass = "win-tag";
                    if (item.status.includes("JACKPOT")) styleClass = "jackpot-tag";

                    html += `<div class="history-item">
                        <span>P: ${item.issue}</span>
                        <span>EXP: ${item.pred}</span>
                        <span>RES: ${item.actual}</span>
                        <span class="${styleClass}">${item.status}</span>
                    </div>`;
                });
                container.innerHTML = html;
            }
        }

        const predictor = new UltimateEngine();
        let last_server_issue = null;
        let last_predicted_displayed_issue = null;

        function speak(text) {
            try {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 1.1;
                window.speechSynthesis.speak(msg);
            } catch(e) {}
        }

        window.onload = function() {
            preloadAndStart();
        };

        // रोबोट बटन क्लिक करने पर हैंडलिंग
        function handleRobotClick() {
            if (isVerifiedInSession) {
                // अगर गेम के इस सेशन में एक बार वेरिफिकेशन हो चुका है, तो सीधा पैनल खुलेगा
                togglePanel(true);
            } else {
                // पहली बार क्लिक करने पर डिज़ाइनर पासवर्ड बॉक्स खुलेगा
                document.getElementById('login-overlay').style.display = 'flex';
            }
        }

        // डिज़ाइनर बॉक्स पासवर्ड वेरिफिकेशन फ़ंक्शन
        function verifySecretCode() {
            let inputVal = document.getElementById('passInput').value.trim();
            if (inputVal === REQUIRED_PASS) {
                isVerifiedInSession = true; // सेशन लॉक एक्टिवेटेड (अब दोबारा नहीं मांगेगा)
                document.getElementById('login-overlay').style.display = 'none';
                speak("Access granted.");
                togglePanel(true);
            } else {
                speak("Wrong code.");
                alert("ACCESS DENIED: WRONG SECURITY CODE!");
                document.getElementById('passInput').value = "";
            }
        }

        function togglePanel(show) {
            if (show) {
                document.getElementById('hack-box').style.display = 'block';
                document.getElementById('show-panel-btn').style.display = 'none';
            } else {
                document.getElementById('hack-box').style.display = 'none';
                document.getElementById('show-panel-btn').style.display = 'flex';
                document.getElementById('history-box').style.display = 'none';
            }
        }

        function showHistory() {
            const hBox = document.getElementById('history-box');
            hBox.style.display = hBox.style.display === 'block' ? 'none' : 'block';
        }

        function makeDraggable(element, handle) {
            let active = false, xOff = 0, yOff = 0, startX, startY;
            handle.addEventListener("touchstart", (e) => { 
                startX = e.touches[0].clientX - xOff; 
                startY = e.touches[0].clientY - yOff; 
                active = true; 
            });
            document.addEventListener("touchmove", (e) => { 
                if (active) { 
                    xOff = e.touches[0].clientX - startX; 
                    yOff = e.touches[0].clientY - startY; 
                    element.style.transform = `translate3d(${xOff}px, ${yOff}px, 0)`; 
                } 
            });
            document.addEventListener("touchend", () => active = false);
        }

        makeDraggable(document.getElementById("hack-box"), document.getElementById("handle"));
        makeDraggable(document.getElementById("show-panel-btn"), document.getElementById("show-panel-btn"));

        async function preloadAndStart() {
            try {
                let response = await fetch(API_URL);
                let data = await response.json();
                if (data && data.data && data.data.list) {
                    let list = data.data.list.slice(0, 20).reverse();
                    list.forEach(item => predictor.update(parseInt(item.number)));
                }
            } catch (e) {}
            setInterval(fetchLiveServerData, 1000);
        }

        async function fetchLiveServerData() {
            const signal = document.getElementById('signal');
            const secText = document.getElementById('sec');
            const fill = document.getElementById('fill');
            const periodEl = document.getElementById('period');
            const numsEl = document.getElementById('nums');

            try {
                let response = await fetch(API_URL);
                let data = await response.json();
                
                if (data && data.data && data.data.list) {
                    let latest = data.data.list[0];
                    let current_server_issue = latest.issueNumber;
                    let current_number = parseInt(latest.number);

                    let baseIssueStr = current_server_issue.slice(0, -4);
                    let numPart = parseInt(current_server_issue.slice(-4));
                    let next_predicted_issue = baseIssueStr + String(numPart + 1).padStart(4, '0');

                    periodEl.innerText = next_predicted_issue;

                    let serverTime = new Date();
                    let seconds = serverTime.getUTCSeconds();
                    let remaining = 30 - (seconds % 30);
                    
                    secText.innerText = remaining < 10 ? "0" + remaining : remaining;
                    fill.style.width = (remaining / 30 * 100) + "%";

                    if (remaining <= 5 && remaining > 0) tickSound.play().catch(e=>{});

                    if (last_server_issue !== current_server_issue) {
                        if(last_predicted_displayed_issue !== null) {
                            predictor.checkOutcome(last_predicted_displayed_issue, current_number);
                        }

                        last_server_issue = current_server_issue;
                        last_predicted_displayed_issue = next_predicted_issue;
                        
                        predictor.update(current_number);
                        signal.innerText = "WAITING";
                        
                        setTimeout(() => {
                            let result = predictor.predict();
                            signal.innerText = result.pred;
                            signal.style.color = (result.pred === "BIG") ? "#fbff00" : "#00ffcc";
                            
                            let primaryNum = result.exactNum;
                            let secondaryNum = (result.pred === "BIG") ? [7, 8, 9, 6].filter(n => n !== primaryNum)[Math.floor(Math.random()*3)] : [0, 1, 2, 3].filter(n => n !== primaryNum)[Math.floor(Math.random()*3)];
                            numsEl.innerText = primaryNum + " , " + secondaryNum;

                            speak(result.pred);
                        }, 700);
                    }
                }
            } catch (e) {}
        }
    </script>
</body>
</html>
